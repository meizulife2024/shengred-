<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>智慧叫貨系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: #0f0f14; color: #e8e8f0; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #1a1a24; }
  ::-webkit-scrollbar-thumb { background: #3a3a50; border-radius: 3px; }
  .tab-btn { background: none; border: none; color: #888; cursor: pointer; padding: 10px 18px; font-size: 14px; font-family: inherit; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab-btn.active { color: #f5c518; border-bottom: 2px solid #f5c518; }
  .tab-btn:hover { color: #f5c518; }
  .card { background: #1a1a24; border-radius: 12px; border: 1px solid #2a2a38; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .btn { border: none; cursor: pointer; font-family: inherit; border-radius: 8px; font-weight: 600; transition: all 0.2s; }
  .btn-primary { background: #f5c518; color: #0f0f14; padding: 10px 20px; font-size: 14px; }
  .btn-primary:hover { background: #ffd740; }
  .btn-primary:disabled { background: #555; color: #888; cursor: not-allowed; }
  .btn-sm { background: #2a2a38; color: #aaa; padding: 5px 12px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; font-family: inherit; }
  .btn-sm:hover { background: #3a3a50; color: #e8e8f0; }
  .btn-save { background: #30d158; color: #fff; padding: 5px 12px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; font-family: inherit; }
  input[type=number], input[type=text], textarea { background: #12121a; border: 1px solid #2a2a38; color: #e8e8f0; border-radius: 6px; font-family: inherit; padding: 6px 10px; }
  input[type=number]:focus, textarea:focus { outline: 1px solid #f5c518; }
  .progress-bar { height: 6px; border-radius: 3px; background: #2a2a38; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .pulse { animation: pulse 1.5s infinite; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { padding: 10px 14px; text-align: left; color: #666; font-weight: 600; font-size: 12px; background: #12121a; }
  td { padding: 12px 14px; border-top: 1px solid #1e1e2a; }
  @media(max-width:600px){
    .hide-mobile { display: none; }
    td, th { padding: 8px 8px; font-size: 12px; }
    .tab-btn { padding: 10px 10px; font-size: 12px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const DEFAULT_PRODUCTS = [
  { id: 1, name: "豬五花肉", category: "肉類", unit: "kg", safetyStock: 5, currentStock: 3.5, avgDaily: 2.1 },
  { id: 2, name: "雞腿肉", category: "肉類", unit: "kg", safetyStock: 8, currentStock: 12, avgDaily: 3.2 },
  { id: 3, name: "高麗菜", category: "蔬菜", unit: "kg", safetyStock: 6, currentStock: 2, avgDaily: 4.5 },
  { id: 4, name: "青蔥", category: "蔬菜", unit: "把", safetyStock: 10, currentStock: 6, avgDaily: 3.8 },
  { id: 5, name: "豆腐", category: "豆製品", unit: "盒", safetyStock: 12, currentStock: 8, avgDaily: 5.0 },
  { id: 6, name: "白蘿蔔", category: "蔬菜", unit: "kg", safetyStock: 4, currentStock: 7, avgDaily: 1.8 },
  { id: 7, name: "雞蛋", category: "蛋品", unit: "顆", safetyStock: 60, currentStock: 25, avgDaily: 30 },
  { id: 8, name: "豬絞肉", category: "肉類", unit: "kg", safetyStock: 5, currentStock: 9, avgDaily: 2.5 },
];

const HOLIDAYS = ["2025-01-01","2025-02-08","2025-02-09","2025-02-10","2025-04-04","2025-06-09","2025-09-08","2025-10-10","2026-01-01","2026-02-17","2026-02-18","2026-02-19","2026-04-04","2026-06-19","2026-09-28","2026-10-10"];
const HOLIDAY_MULT = 1.45;
const DOW_MULT = { 0:1.3, 6:1.25, 1:0.9, 2:0.9, 3:0.95, 4:1.0, 5:1.15 };

function getStatus(p) {
  const days = p.currentStock / p.avgDaily;
  if (p.currentStock <= p.safetyStock * 0.5) return "缺貨危機";
  if (p.currentStock <= p.safetyStock) return "庫存不足";
  if (days > 4) return "庫存充足";
  return "即將不足";
}

function statusColor(s) {
  return {"缺貨危機":"#ff3b30","庫存不足":"#ff9500","即將不足":"#ffcc00","庫存充足":"#30d158"}[s]||"#888";
}

function calcQty(p, days, isHol, dow) {
  const mult = isHol ? HOLIDAY_MULT : (DOW_MULT[dow] ?? 1.0);
  return Math.max(0, Math.ceil((p.safetyStock * 1.5 + p.avgDaily * mult * days - p.currentStock) * 10) / 10);
}

function App() {
  const [tab, setTab] = useState("dashboard");
  const [cat, setCat] = useState("全部");
  const [products, setProducts] = useState(DEFAULT_PRODUCTS);
  const [days, setDays] = useState(2);
  const [csv, setCsv] = useState("");
  const [imported, setImported] = useState(0);
  const [aiText, setAiText] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [editId, setEditId] = useState(null);
  const [editVals, setEditVals] = useState({});

  const today = new Date();
  const todayStr = today.toISOString().split("T")[0];
  const isHol = HOLIDAYS.includes(todayStr);
  const dow = today.getDay();

  const cats = ["全部","肉類","蔬菜","豆製品","蛋品"];
  const filtered = cat === "全部" ? products : products.filter(p => p.category === cat);
  const alerts = products.filter(p => ["缺貨危機","庫存不足"].includes(getStatus(p)));
  const crisis = products.filter(p => getStatus(p) === "缺貨危機").length;
  const avgRate = Math.round(products.reduce((s,p) => s + p.currentStock/(p.safetyStock*1.5), 0) / products.length * 100);

  function startEdit(p) { setEditId(p.id); setEditVals({currentStock:p.currentStock, safetyStock:p.safetyStock, avgDaily:p.avgDaily}); }
  function saveEdit(id) { setProducts(ps => ps.map(p => p.id===id ? {...p,...editVals} : p)); setEditId(null); }

  function importCsv() {
    const lines = csv.trim().split("\n").slice(1);
    const parsed = lines.map(l => {
      const [name,category,unit,cs,ss,ad] = l.split(",");
      return { id: Date.now()+Math.random(), name:name?.trim(), category:category?.trim(), unit:unit?.trim(),
        currentStock:parseFloat(cs)||0, safetyStock:parseFloat(ss)||0, avgDaily:parseFloat(ad)||0 };
    }).filter(p=>p.name);
    setImported(parsed.length);
    if (parsed.length) setProducts(prev => [...prev.filter(p => !parsed.find(np=>np.name===p.name)), ...parsed]);
  }

  async function runAI() {
    setAiLoading(true); setAiText("");
    const summary = products.map(p => ({
      name:p.name, category:p.category, currentStock:p.currentStock,
      safetyStock:p.safetyStock, avgDaily:p.avgDaily, status:getStatus(p),
      orderQty:calcQty(p,days,isHol,dow)
    }));
    const prompt = `你是一位餐飲業採購顧問，請根據以下庫存與銷售數據，提供專業的叫貨建議與毛利提升策略。請用繁體中文回答，結構清晰，分點說明：\n\n${JSON.stringify(summary,null,2)}\n\n今天是否為假日：${isHol?"是":"否"}，預計叫貨天數：${days}天\n\n請針對：1.即將缺貨品項的緊急建議 2.假日叫貨量調整策略 3.降低缺貨率的建議 4.毛利提升機會`;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, messages:[{role:"user",content:prompt}] })
      });
      const data = await res.json();
      setAiText(data.content?.map(c=>c.text).join("\n") || "無法取得分析結果");
    } catch { setAiText("AI 分析失敗，請確認網路連線後再試。"); }
    setAiLoading(false);
  }

  return (
    <div style={{minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"#15151e",borderBottom:"1px solid #2a2a38",padding:"0 16px",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:20}}>🍽️</span>
            <span style={{fontWeight:900,fontSize:16,color:"#f5c518"}}>智慧叫貨系統</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",justifyContent:"flex-end"}}>
            {isHol && <span className="badge" style={{background:"#ff375f22",color:"#ff375f",fontSize:11}}>📅 假日 +45%</span>}
            {alerts.length>0 && <span className="badge pulse" style={{background:"#ff3b3022",color:"#ff3b30",fontSize:11}}>⚠️ {alerts.length}項警示</span>}
            <span style={{fontSize:12,color:"#555"}}>{today.toLocaleDateString("zh-TW",{month:"short",day:"numeric",weekday:"short"})}</span>
          </div>
        </div>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",overflowX:"auto"}}>
          {[["dashboard","📊 儀表板"],["order","🛒 叫貨"],["ai","🤖 AI分析"],["import","📥 匯入"]].map(([k,l])=>(
            <button key={k} className={`tab-btn${tab===k?" active":""}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:1100,margin:"0 auto",padding:"20px 16px"}}>

        {/* DASHBOARD */}
        {tab==="dashboard" && (
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:20}}>
              {[
                {label:"缺貨危機",value:crisis,color:"#ff3b30",icon:"🔴"},
                {label:"庫存警示",value:alerts.length,color:"#ff9500",icon:"⚠️"},
                {label:"平均庫存率",value:avgRate+"%",color:"#30d158",icon:"📦"},
                {label:"監控品項",value:products.length,color:"#0a84ff",icon:"📋"},
              ].map(k=>(
                <div key={k.label} className="card" style={{padding:"14px 16px"}}>
                  <div style={{fontSize:18,marginBottom:6}}>{k.icon}</div>
                  <div style={{fontSize:24,fontWeight:900,color:k.color}}>{k.value}</div>
                  <div style={{fontSize:12,color:"#666",marginTop:2}}>{k.label}</div>
                </div>
              ))}
            </div>

            <div style={{display:"flex",gap:8,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
              {cats.map(c=>(
                <button key={c} className="btn-sm" onClick={()=>setCat(c)}
                  style={{background:cat===c?"#f5c518":"#2a2a38",color:cat===c?"#0f0f14":"#aaa",whiteSpace:"nowrap"}}>
                  {c}
                </button>
              ))}
            </div>

            <div className="card" style={{overflowX:"auto"}}>
              <div style={{padding:"14px 16px",borderBottom:"1px solid #2a2a38",fontWeight:700}}>庫存總覽</div>
              <table>
                <thead><tr>
                  <th>品名</th>
                  <th className="hide-mobile">分類</th>
                  <th>現有庫存</th>
                  <th className="hide-mobile">安全庫存</th>
                  <th>可用天</th>
                  <th>狀態</th>
                  <th>操作</th>
                </tr></thead>
                <tbody>
                  {filtered.map(item => {
                    const st = getStatus(item);
                    const daysLeft = (item.currentStock/item.avgDaily).toFixed(1);
                    const isEd = editId===item.id;
                    const pct = Math.min(100, Math.round(item.currentStock/(item.safetyStock*1.5)*100));
                    return (
                      <tr key={item.id} style={{background:["缺貨危機","庫存不足"].includes(st)?"#ff3b3006":"transparent"}}>
                        <td style={{fontWeight:600}}>{item.name}</td>
                        <td className="hide-mobile" style={{color:"#888"}}>{item.category}</td>
                        <td>
                          {isEd ? <input type="number" value={editVals.currentStock} onChange={e=>setEditVals(v=>({...v,currentStock:parseFloat(e.target.value)}))} style={{width:60}}/> :
                          <div>
                            <span style={{fontWeight:700}}>{item.currentStock}</span> <span style={{color:"#666",fontSize:11}}>{item.unit}</span>
                            <div className="progress-bar" style={{marginTop:3,width:60}}>
                              <div className="progress-fill" style={{width:pct+"%",background:pct<50?"#ff3b30":pct<75?"#ff9500":"#30d158"}}/>
                            </div>
                          </div>}
                        </td>
                        <td className="hide-mobile">
                          {isEd ? <input type="number" value={editVals.safetyStock} onChange={e=>setEditVals(v=>({...v,safetyStock:parseFloat(e.target.value)}))} style={{width:60}}/> :
                          <span>{item.safetyStock} {item.unit}</span>}
                        </td>
                        <td style={{color:parseFloat(daysLeft)<2?"#ff3b30":"#e8e8f0",fontWeight:700}}>{daysLeft}天</td>
                        <td><span className="badge" style={{background:statusColor(st)+"22",color:statusColor(st)}}>{st}</span></td>
                        <td>{isEd
                          ? <button className="btn-save" onClick={()=>saveEdit(item.id)}>儲存</button>
                          : <button className="btn-sm" onClick={()=>startEdit(item)}>編輯</button>
                        }</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ORDER */}
        {tab==="order" && (
          <div>
            <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
              <div className="card" style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
                <span style={{color:"#888",fontSize:14}}>叫貨天數</span>
                <input type="number" min={1} max={7} value={days} onChange={e=>setDays(parseInt(e.target.value)||1)}
                  style={{width:55,textAlign:"center",fontSize:16,fontWeight:700}}/>
                <span style={{color:"#666",fontSize:13}}>天</span>
              </div>
              {isHol && <div className="card" style={{padding:"12px 16px",background:"#ff375f11",borderColor:"#ff375f33"}}>
                <span style={{color:"#ff375f",fontWeight:700,fontSize:13}}>📅 今日假日，叫貨量自動 +45%</span>
              </div>}
            </div>

            <div className="card" style={{overflowX:"auto"}}>
              <div style={{padding:"14px 16px",borderBottom:"1px solid #2a2a38",fontWeight:700}}>叫貨清單（建議量）</div>
              <table>
                <thead><tr>
                  <th>品名</th>
                  <th className="hide-mobile">現有</th>
                  <th className="hide-mobile">日均</th>
                  <th>建議叫貨量</th>
                  <th>狀態</th>
                </tr></thead>
                <tbody>
                  {products.map(item => {
                    const qty = calcQty(item, days, isHol, dow);
                    const st = getStatus(item);
                    return (
                      <tr key={item.id} style={{background:["缺貨危機","庫存不足"].includes(st)?"#ff3b3008":"transparent"}}>
                        <td style={{fontWeight:600}}>{item.name}</td>
                        <td className="hide-mobile">{item.currentStock} {item.unit}</td>
                        <td className="hide-mobile">{item.avgDaily}/日</td>
                        <td>
                          <span style={{fontSize:17,fontWeight:900,color:qty>0?"#f5c518":"#30d158"}}>{qty>0?qty:"—"}</span>
                          {qty>0 && <span style={{color:"#666",fontSize:11,marginLeft:4}}>{item.unit}</span>}
                        </td>
                        <td><span className="badge" style={{background:statusColor(st)+"22",color:statusColor(st)}}>{st}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{marginTop:12,color:"#555",fontSize:12}}>※ 叫貨量 = 安全庫存×1.5 + 預計需求 − 現有庫存，假日×1.45，週末×1.25</div>
          </div>
        )}

        {/* AI */}
        {tab==="ai" && (
          <div>
            <div className="card" style={{padding:20,marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:15,marginBottom:6}}>🤖 AI 採購顧問分析</div>
              <div style={{color:"#888",fontSize:13,marginBottom:16}}>根據目前庫存與銷售數據，AI 將提供叫貨策略、缺貨預防與毛利提升建議。</div>
              <button className="btn btn-primary" onClick={runAI} disabled={aiLoading}>
                {aiLoading?"⏳ 分析中...":"▶ 開始 AI 分析"}
              </button>
            </div>
            {aiText && (
              <div className="card" style={{padding:20}}>
                <div style={{fontWeight:700,marginBottom:12,color:"#f5c518"}}>📋 分析結果</div>
                <div style={{whiteSpace:"pre-wrap",lineHeight:1.8,fontSize:14,color:"#ccc"}}>{aiText}</div>
              </div>
            )}
            {!aiText && !aiLoading && (
              <div style={{textAlign:"center",color:"#444",padding:"50px 0",fontSize:14}}>點擊上方按鈕開始分析</div>
            )}
          </div>
        )}

        {/* IMPORT */}
        {tab==="import" && (
          <div>
            <div className="card" style={{padding:20,marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:15,marginBottom:10}}>📥 匯入 POS 數據（CSV 格式）</div>
              <div style={{color:"#888",fontSize:13,marginBottom:10}}>
                請貼上 CSV 內容，欄位順序：<br/>
                <code style={{background:"#12121a",padding:"3px 8px",borderRadius:4,color:"#f5c518",fontSize:12}}>品名,分類,單位,現有庫存,安全庫存,日均消耗</code>
              </div>
              <div style={{background:"#12121a",borderRadius:8,padding:10,marginBottom:10,fontSize:12,color:"#666",lineHeight:1.8}}>
                範例：<br/>豬五花肉,肉類,kg,5.5,5,2.1<br/>高麗菜,蔬菜,kg,3,6,4.5
              </div>
              <textarea rows={7} value={csv} onChange={e=>setCsv(e.target.value)}
                placeholder={"品名,分類,單位,現有庫存,安全庫存,日均消耗\n豬五花肉,肉類,kg,5.5,5,2.1"}
                style={{width:"100%",fontSize:13,resize:"vertical",marginBottom:12}}/>
              <button className="btn btn-primary" onClick={importCsv}>匯入數據</button>
              {imported>0 && <div style={{marginTop:10,color:"#30d158",fontSize:13}}>✅ 已匯入 {imported} 筆品項</div>}
            </div>

            <div className="card" style={{padding:20}}>
              <div style={{fontWeight:700,marginBottom:10}}>📅 假日設定</div>
              <div style={{color:"#888",fontSize:13,marginBottom:10}}>叫貨量自動 +45% 的日期：</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {HOLIDAYS.map(d=>(
                  <span key={d} className="badge" style={{background:"#f5c51822",color:"#f5c518"}}>{d}</span>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
